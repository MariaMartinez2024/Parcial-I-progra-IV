<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Parcial Primer Cómputo</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

<header class="barra-superior">

    <div class="logo">
        <img src="https://ugb.edu.sv/wp-content/uploads/2025/10/UGB_LOGOTIPO_HORIZONTAL_POS-2.png">
    </div>

    <div class="titulo">
        Parcial Primer Cómputo Ingeniería en Sistemas y Redes Informáticas
    </div>

</header>


<main class="contenido">

    <div class="app-container">

        <h2>Registro de Tareas</h2>

        <form id="taskForm">

            <input type="text" id="taskInput" placeholder="Ingrese una tarea">

            <select id="priority">
                <option value="">Seleccione prioridad</option>
                <option value="Alta">Alta</option>
                <option value="Media">Media</option>
                <option value="Baja">Baja</option>
            </select>

            <button type="submit">Agregar Tarea</button>

        </form>

        <div id="taskList"></div>

    </div>

</main>


<footer class="barra-inferior">

    <p><strong>Integrantes del Equipo</strong></p>

    <p>
        Tu Nombre y Código |
        Nombre compañero y Código
    </p>

</footer>

<script src="app.js"></script>

</body>
</html>
